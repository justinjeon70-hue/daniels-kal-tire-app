<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#14141f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4421e"/>
      <stop offset="100%" stop-color="#ff6b2b"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="20" y="20" width="472" height="472" rx="80" fill="none" stroke="#d4421e" stroke-width="3" opacity="0.3"/>
  <!-- Speedometer arc -->
  <path d="M 160,340 A 120,120 0 0,1 352,340" fill="none" stroke="#2a2a3e" stroke-width="16" stroke-linecap="round"/>
  <path d="M 160,340 A 120,120 0 0,1 310,248" fill="none" stroke="url(#accent)" stroke-width="16" stroke-linecap="round"/>
  <!-- Needle -->
  <line x1="256" y1="340" x2="290" y2="270" stroke="#ff4444" stroke-width="4" stroke-linecap="round"/>
  <circle cx="256" cy="340" r="8" fill="#d4421e"/>
  <!-- Text -->
  <text x="256" y="400" text-anchor="middle" font-family="sans-serif" font-weight="900" font-size="48" fill="white">KAL</text>
  <text x="256" y="440" text-anchor="middle" font-family="sans-serif" font-weight="700" font-size="24" fill="#d4421e">TIRE</text>
  <!-- Racing stripes -->
  <rect x="40" y="462" width="432" height="4" rx="2" fill="#d4421e" opacity="0.5"/>
  <rect x="60" y="472" width="392" height="3" rx="1.5" fill="#ff6b2b" opacity="0.3"/>
</svg>
